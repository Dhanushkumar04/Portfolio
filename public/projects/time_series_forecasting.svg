<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040814" />
      <stop offset="100%" stop-color="#0b132b" />
    </linearGradient>
    <!-- Grid Line Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
    <!-- Line Gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.0" />
    </linearGradient>
    <linearGradient id="forecastAreaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.0" />
    </linearGradient>
    <!-- Neon Glow Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowGold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#grid)" />

  <!-- Glowing Aura behind forecast -->
  <circle cx="580" cy="200" r="120" fill="#f59e0b" opacity="0.05" filter="blur(40px)" />
  <circle cx="280" cy="300" r="150" fill="#06b6d4" opacity="0.05" filter="blur(50px)" />

  <!-- Axes -->
  <line x1="80" y1="420" x2="740" y2="420" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" />
  <line x1="80" y1="60" x2="80" y2="420" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" />

  <!-- Y-Axis Labels & Helper Lines -->
  <g font-family="sans-serif" font-size="12" fill="rgba(255, 255, 255, 0.4)" text-anchor="end">
    <text x="70" y="105">100k</text>
    <line x1="80" y1="100" x2="740" y2="100" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" stroke-dasharray="4,4" />
    
    <text x="70" y="185">75k</text>
    <line x1="80" y1="180" x2="740" y2="180" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" stroke-dasharray="4,4" />
    
    <text x="70" y="265">50k</text>
    <line x1="80" y1="260" x2="740" y2="260" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" stroke-dasharray="4,4" />
    
    <text x="70" y="345">25k</text>
    <line x1="80" y1="340" x2="740" y2="340" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" stroke-dasharray="4,4" />
  </g>

  <!-- X-Axis Labels (Timeline) -->
  <g font-family="sans-serif" font-size="12" fill="rgba(255, 255, 255, 0.4)" text-anchor="middle">
    <text x="140" y="445">2021</text>
    <text x="260" y="445">2022</text>
    <text x="380" y="445">2023</text>
    <text x="500" y="445">2024</text>
    <text x="640" y="445">2025 (Forecast)</text>
  </g>

  <!-- Area under curve (Historical) -->
  <path d="M 80 420 L 80 320 C 140 280, 200 360, 260 290 C 320 220, 380 240, 440 180 C 470 150, 485 160, 500 160 L 500 420 Z" fill="url(#areaGrad)" />
  
  <!-- Area under curve (Forecast) -->
  <path d="M 500 160 C 530 160, 560 110, 620 120 C 680 130, 710 80, 740 90 L 740 420 L 500 420 Z" fill="url(#forecastAreaGrad)" />

  <!-- Historical Data Line -->
  <path d="M 80 320 C 140 280, 200 360, 260 290 C 320 220, 380 240, 440 180 C 470 150, 485 160, 500 160" 
        fill="none" stroke="url(#cyanGrad)" stroke-width="4" filter="url(#glowCyan)" stroke-linecap="round" />

  <!-- SARIMAX Forecasted Data Line -->
  <path d="M 500 160 C 530 160, 560 110, 620 120 C 680 130, 710 80, 740 90" 
        fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-dasharray="8,6" filter="url(#glowGold)" stroke-linecap="round" />

  <!-- Separation Line (Present Day) -->
  <line x1="500" y1="60" x2="500" y2="420" stroke="rgba(255, 255, 255, 0.25)" stroke-width="1.5" stroke-dasharray="5,5" />
  
  <!-- Indicator Dots & Callouts -->
  <!-- Historical Dot -->
  <circle cx="440" cy="180" r="5" fill="#06b6d4" />
  <circle cx="440" cy="180" r="10" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" />
  
  <!-- Forecast Dot -->
  <circle cx="620" cy="120" r="5" fill="#f59e0b" />
  <circle cx="620" cy="120" r="10" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.5" />
  
  <!-- Text Annotations -->
  <rect x="510" y="70" width="130" height="30" rx="6" fill="#1e293b" stroke="rgba(245, 158, 11, 0.3)" stroke-width="1" />
  <text x="575" y="89" font-family="sans-serif" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="middle">SARIMAX PREDICTION</text>

  <rect x="300" y="80" width="110" height="30" rx="6" fill="#1e293b" stroke="rgba(6, 182, 212, 0.3)" stroke-width="1" />
  <text x="355" y="99" font-family="sans-serif" font-size="11" font-weight="bold" fill="#06b6d4" text-anchor="middle">RMSE: 1.59%</text>
  
  <rect x="650" y="360" width="80" height="40" rx="6" fill="rgba(15, 23, 42, 0.85)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />
  <text x="690" y="377" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">FORECAST</text>
  <text x="690" y="392" font-family="sans-serif" font-size="12" font-weight="black" fill="#fff" text-anchor="middle">UP TO 2025</text>
</svg>
